apiVersion: v1
kind: ServiceAccount
metadata:
  name: substrate-control
  namespace: substrate-control
---
# Minimal permissions for the console's feature surface (ADR-0002).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: substrate-control
rules:
  # CRDs the console manages.
  - apiGroups: ["ate.dev"]
    resources: ["actortemplates", "workerpools", "sandboxconfigs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Known compromise (ADR-0002): the console manages secrets in arbitrary
  # namespaces (agent templates and namespaces combine freely), so
  # cluster-wide secrets RW is required for now. A future namespace
  # allowlist config will narrow this down.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Node capacity (for the monitoring page percentages).
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  # metrics-server read (monitoring page; harmless when absent).
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: substrate-control
subjects:
  - kind: ServiceAccount
    name: substrate-control
    namespace: substrate-control
roleRef:
  kind: ClusterRole
  name: substrate-control
  apiGroup: rbac.authorization.k8s.io
---
# Read only the LiteLLM master-key secret, scoped to the litellm namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: substrate-control
  namespace: litellm
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["litellm-secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: substrate-control
  namespace: litellm
subjects:
  - kind: ServiceAccount
    name: substrate-control
    namespace: substrate-control
roleRef:
  kind: Role
  name: substrate-control
  apiGroup: rbac.authorization.k8s.io
